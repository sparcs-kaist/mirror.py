[supervisord]
nodaemon=true
logfile=/var/log/mirror/supervisord.log
pidfile=/var/run/supervisord.pid

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:worker]
command=mirror worker --config /etc/mirror/config.json
autostart=true
autorestart=true
priority=1
stdout_logfile=/var/log/mirror/worker.stdout.log
stderr_logfile=/var/log/mirror/worker.stderr.log
redirect_stderr=false

[program:master]
command=mirror daemon --config /etc/mirror/config.json
autostart=true
autorestart=true
priority=2
startsecs=2
stdout_logfile=/var/log/mirror/master.stdout.log
stderr_logfile=/var/log/mirror/master.stderr.log
redirect_stderr=false
