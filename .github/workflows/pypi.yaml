name: pypi

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.10

      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg_version=$(uv run python -c "import re; print(re.search(r'^version = \"([^\"]+)\"', open('pyproject.toml', encoding='utf-8').read(), re.MULTILINE).group(1))")
          if [ "$tag" != "$pkg_version" ]; then
            echo "Tag '$tag' does not match pyproject version '$pkg_version'."
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
